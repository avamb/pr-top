# PR-TOP Nginx Reverse Proxy Configuration
# Single entry point for all services in production

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=analytics_limit:10m rate=10r/s;

# Upstream definitions
upstream frontend {
    server frontend:80;
}

upstream backend {
    server backend:3001;
}

upstream umami {
    server umami:3000;
}

server {
    listen 80;
    server_name _;

    # Redirect all HTTP to HTTPS (when SSL is configured)
    # Uncomment these lines when SSL certificates are available:
    # return 301 https://$host$request_uri;

    # Include the shared location blocks (used for both HTTP and HTTPS)
    include /etc/nginx/conf.d/locations.conf;
}

