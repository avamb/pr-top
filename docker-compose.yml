services:
  # === Backend API ===
  backend:
    build:
      context: ./src/backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=3001
      - FRONTEND_URL=http://frontend
      # AI provider configuration
      - AI_PROVIDER=${AI_PROVIDER:-openai}
      - AI_MODEL=${AI_MODEL:-gpt-4o-mini}
      - AI_API_KEY=${AI_API_KEY:-}
      - AI_API_URL=${AI_API_URL:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - ANTHROPIC_API_URL=${ANTHROPIC_API_URL:-}
      - GOOGLE_AI_API_KEY=${GOOGLE_AI_API_KEY:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      # Transcription configuration
      - TRANSCRIPTION_PROVIDER=${TRANSCRIPTION_PROVIDER:-openai}
      - TRANSCRIPTION_MODEL=${TRANSCRIPTION_MODEL:-whisper-1}
      - TRANSCRIPTION_API_KEY=${TRANSCRIPTION_API_KEY:-}
      - TRANSCRIPTION_API_URL=${TRANSCRIPTION_API_URL:-}
      - TRANSCRIPTION_LANGUAGE=${TRANSCRIPTION_LANGUAGE:-}
    volumes:
      - backend-data:/app/data
      - backend-uploads:/app/data/sessions
      - backend-backups:/app/backups
    expose:
      - "3001"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/api/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # === Frontend SPA ===
  frontend:
    build:
      context: ./src/frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    expose:
      - "80"
    depends_on:
      backend:
        condition: service_healthy

  # === Telegram Bot ===
  bot:
    build:
      context: ./src/bot
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - BACKEND_URL=http://backend:3001
    depends_on:
      backend:
        condition: service_healthy

  # === Umami Web Analytics ===
  umami:
    image: ghcr.io/umami-software/umami:postgresql-latest
    restart: unless-stopped
    environment:
      - DATABASE_URL=${UMAMI_DATABASE_URL:-postgresql://umami:umami@umami-db:5432/umami}
      - APP_SECRET=${UMAMI_APP_SECRET:-replace-me-with-a-random-string}
    ports:
      - "3000:3000"
    depends_on:
      umami-db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/heartbeat', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # === Umami PostgreSQL Database ===
  umami-db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      - POSTGRES_DB=umami
      - POSTGRES_USER=${UMAMI_DB_USER:-umami}
      - POSTGRES_PASSWORD=${UMAMI_DB_PASSWORD:-umami}
    volumes:
      - umami-db-data:/var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-umami} -d umami"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  backend-data:
    driver: local
  backend-uploads:
    driver: local
  backend-backups:
    driver: local
  umami-db-data:
    driver: local
