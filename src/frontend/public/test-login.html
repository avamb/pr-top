<!DOCTYPE html>
<html>
<head><title>Auto Login</title></head>
<body>
<p id="status">Logging in...</p>
<script>
async function login() {
  try {
    const csrfRes = await fetch('http://localhost:3001/api/csrf-token');
    const csrf = await csrfRes.json();
    const loginRes = await fetch('http://localhost:3001/api/auth/login', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'X-CSRF-Token': csrf.csrfToken
      },
      body: JSON.stringify({email: 'admin@pr-top.com', password: 'Admin123!'})
    });
    const data = await loginRes.json();
    if (data.token) {
      localStorage.setItem('token', data.token);
      localStorage.setItem('user', JSON.stringify(data.user));
      document.getElementById('status').textContent = 'Login OK - redirecting...';
      const params = new URLSearchParams(window.location.search);
      window.location.href = params.get('redirect') || '/admin/promos';
    } else {
      document.getElementById('status').textContent = 'Login failed: ' + JSON.stringify(data);
    }
  } catch(e) {
    document.getElementById('status').textContent = 'Error: ' + e.message;
  }
}
login();
</script>
</body>
</html>
