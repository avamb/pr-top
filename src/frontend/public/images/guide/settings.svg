<svg xmlns="http://www.w3.org/2000/svg" width="600" height="300" viewBox="0 0 600 300">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F4F7F6"/>
      <stop offset="100%" stop-color="#E6F5F3"/>
    </linearGradient>
  </defs>
  <rect width="600" height="300" fill="url(#bg)" rx="12"/>
  <text x="30" y="35" fill="#1C2328" font-family="sans-serif" font-size="16" font-weight="bold">Settings</text>
  <!-- Settings sections -->
  <rect x="30" y="50" width="540" height="235" fill="#fff" rx="8" stroke="#D9E2E0" stroke-width="1"/>
  <!-- Language -->
  <text x="50" y="78" fill="#1C2328" font-family="sans-serif" font-size="11" font-weight="bold">Language</text>
  <rect x="400" y="63" width="150" height="26" fill="#F4F7F6" rx="5" stroke="#D9E2E0" stroke-width="1"/>
  <text x="475" y="81" text-anchor="middle" fill="#1C2328" font-family="sans-serif" font-size="10">English</text>
  <line x1="50" y1="98" x2="550" y2="98" stroke="#E6F5F3" stroke-width="1"/>
  <!-- Timezone -->
  <text x="50" y="120" fill="#1C2328" font-family="sans-serif" font-size="11" font-weight="bold">Timezone</text>
  <rect x="350" y="105" width="200" height="26" fill="#F4F7F6" rx="5" stroke="#D9E2E0" stroke-width="1"/>
  <text x="450" y="123" text-anchor="middle" fill="#1C2328" font-family="sans-serif" font-size="10">UTC+3 (Europe/Moscow)</text>
  <line x1="50" y1="140" x2="550" y2="140" stroke="#E6F5F3" stroke-width="1"/>
  <!-- Subscription -->
  <text x="50" y="162" fill="#1C2328" font-family="sans-serif" font-size="11" font-weight="bold">Subscription Plan</text>
  <rect x="50" y="172" width="500" height="50" fill="#E6F5F3" rx="6"/>
  <text x="65" y="192" fill="#1F8A83" font-family="sans-serif" font-size="12" font-weight="bold">Professional</text>
  <text x="65" y="208" fill="#5E6A71" font-family="sans-serif" font-size="9">NL search, analytics export, priority support</text>
  <rect x="430" y="183" width="100" height="26" fill="#1F8A83" rx="5"/>
  <text x="480" y="200" text-anchor="middle" fill="#fff" font-family="sans-serif" font-size="10">Upgrade</text>
  <line x1="50" y1="232" x2="550" y2="232" stroke="#E6F5F3" stroke-width="1"/>
  <!-- Payment history -->
  <text x="50" y="254" fill="#1C2328" font-family="sans-serif" font-size="11" font-weight="bold">Payment History</text>
  <rect x="50" y="262" width="500" height="8" fill="#E6F5F3" rx="2"/>
  <text x="400" y="254" fill="#1F8A83" font-family="sans-serif" font-size="9">View all</text>
</svg>
