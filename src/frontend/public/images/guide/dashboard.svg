<svg xmlns="http://www.w3.org/2000/svg" width="600" height="300" viewBox="0 0 600 300">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F4F7F6"/>
      <stop offset="100%" stop-color="#E6F5F3"/>
    </linearGradient>
  </defs>
  <rect width="600" height="300" fill="url(#bg)" rx="12"/>
  <!-- Header bar -->
  <rect x="30" y="20" width="540" height="40" fill="#1F8A83" rx="8"/>
  <text x="50" y="46" fill="#fff" font-family="sans-serif" font-size="14" font-weight="bold">PR-TOP Dashboard</text>
  <circle cx="540" cy="40" r="12" fill="#A8C9BE"/>
  <!-- Stat cards row -->
  <rect x="30" y="75" width="120" height="70" fill="#fff" rx="8" stroke="#D9E2E0" stroke-width="1"/>
  <text x="90" y="100" text-anchor="middle" fill="#1F8A83" font-family="sans-serif" font-size="22" font-weight="bold">12</text>
  <text x="90" y="118" text-anchor="middle" fill="#5E6A71" font-family="sans-serif" font-size="10">Clients</text>
  <rect x="165" y="75" width="120" height="70" fill="#fff" rx="8" stroke="#D9E2E0" stroke-width="1"/>
  <text x="225" y="100" text-anchor="middle" fill="#1F8A83" font-family="sans-serif" font-size="22" font-weight="bold">48</text>
  <text x="225" y="118" text-anchor="middle" fill="#5E6A71" font-family="sans-serif" font-size="10">Sessions</text>
  <rect x="300" y="75" width="120" height="70" fill="#fff" rx="8" stroke="#D9E2E0" stroke-width="1"/>
  <text x="360" y="100" text-anchor="middle" fill="#1F8A83" font-family="sans-serif" font-size="22" font-weight="bold">3</text>
  <text x="360" y="118" text-anchor="middle" fill="#5E6A71" font-family="sans-serif" font-size="10">SOS Alerts</text>
  <rect x="435" y="75" width="135" height="70" fill="#fff" rx="8" stroke="#D9E2E0" stroke-width="1"/>
  <text x="502" y="100" text-anchor="middle" fill="#1F8A83" font-family="sans-serif" font-size="22" font-weight="bold">87</text>
  <text x="502" y="118" text-anchor="middle" fill="#5E6A71" font-family="sans-serif" font-size="10">Diary Entries</text>
  <!-- Activity feed -->
  <rect x="30" y="160" width="260" height="120" fill="#fff" rx="8" stroke="#D9E2E0" stroke-width="1"/>
  <text x="45" y="182" fill="#1C2328" font-family="sans-serif" font-size="11" font-weight="bold">Recent Activity</text>
  <circle cx="50" cy="202" r="4" fill="#10B981"/>
  <rect x="62" y="197" width="160" height="8" fill="#E6F5F3" rx="3"/>
  <circle cx="50" cy="222" r="4" fill="#1F8A83"/>
  <rect x="62" y="217" width="140" height="8" fill="#E6F5F3" rx="3"/>
  <circle cx="50" cy="242" r="4" fill="#DC2626"/>
  <rect x="62" y="237" width="180" height="8" fill="#E6F5F3" rx="3"/>
  <circle cx="50" cy="262" r="4" fill="#10B981"/>
  <rect x="62" y="257" width="120" height="8" fill="#E6F5F3" rx="3"/>
  <!-- Invite code card -->
  <rect x="310" y="160" width="260" height="120" fill="#fff" rx="8" stroke="#D9E2E0" stroke-width="1"/>
  <text x="325" y="182" fill="#1C2328" font-family="sans-serif" font-size="11" font-weight="bold">Invite Code</text>
  <rect x="325" y="195" width="230" height="35" fill="#F4F7F6" rx="6" stroke="#A8C9BE" stroke-width="1" stroke-dasharray="4 2"/>
  <text x="440" y="217" text-anchor="middle" fill="#1F8A83" font-family="monospace" font-size="16" font-weight="bold">ABC-1234</text>
  <rect x="370" y="245" width="100" height="28" fill="#1F8A83" rx="6"/>
  <text x="420" y="264" text-anchor="middle" fill="#fff" font-family="sans-serif" font-size="11">Copy Code</text>
</svg>
