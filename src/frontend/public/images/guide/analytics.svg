<svg xmlns="http://www.w3.org/2000/svg" width="600" height="300" viewBox="0 0 600 300">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F4F7F6"/>
      <stop offset="100%" stop-color="#E6F5F3"/>
    </linearGradient>
  </defs>
  <rect width="600" height="300" fill="url(#bg)" rx="12"/>
  <text x="30" y="35" fill="#1C2328" font-family="sans-serif" font-size="16" font-weight="bold">Analytics</text>
  <!-- Date range -->
  <rect x="380" y="15" width="190" height="28" fill="#fff" rx="6" stroke="#D9E2E0" stroke-width="1"/>
  <text x="475" y="34" text-anchor="middle" fill="#5E6A71" font-family="sans-serif" font-size="10">Mar 1 - Mar 13, 2026</text>
  <!-- Chart area - diary entries per day -->
  <rect x="30" y="55" width="350" height="160" fill="#fff" rx="8" stroke="#D9E2E0" stroke-width="1"/>
  <text x="45" y="75" fill="#1C2328" font-family="sans-serif" font-size="10" font-weight="bold">Diary Entries per Day</text>
  <!-- Bar chart -->
  <rect x="55" y="150" width="22" height="40" fill="#A8C9BE" rx="3"/>
  <rect x="85" y="130" width="22" height="60" fill="#A8C9BE" rx="3"/>
  <rect x="115" y="110" width="22" height="80" fill="#1F8A83" rx="3"/>
  <rect x="145" y="140" width="22" height="50" fill="#A8C9BE" rx="3"/>
  <rect x="175" y="95" width="22" height="95" fill="#1F8A83" rx="3"/>
  <rect x="205" y="120" width="22" height="70" fill="#A8C9BE" rx="3"/>
  <rect x="235" y="105" width="22" height="85" fill="#1F8A83" rx="3"/>
  <rect x="265" y="135" width="22" height="55" fill="#A8C9BE" rx="3"/>
  <rect x="295" y="145" width="22" height="45" fill="#A8C9BE" rx="3"/>
  <rect x="325" y="100" width="22" height="90" fill="#1F8A83" rx="3"/>
  <!-- X axis -->
  <line x1="45" y1="195" x2="360" y2="195" stroke="#D9E2E0" stroke-width="1"/>
  <text x="66" y="207" text-anchor="middle" fill="#5E6A71" font-family="sans-serif" font-size="7">M</text>
  <text x="96" y="207" text-anchor="middle" fill="#5E6A71" font-family="sans-serif" font-size="7">T</text>
  <text x="126" y="207" text-anchor="middle" fill="#5E6A71" font-family="sans-serif" font-size="7">W</text>
  <text x="156" y="207" text-anchor="middle" fill="#5E6A71" font-family="sans-serif" font-size="7">T</text>
  <text x="186" y="207" text-anchor="middle" fill="#5E6A71" font-family="sans-serif" font-size="7">F</text>
  <text x="216" y="207" text-anchor="middle" fill="#5E6A71" font-family="sans-serif" font-size="7">S</text>
  <text x="246" y="207" text-anchor="middle" fill="#5E6A71" font-family="sans-serif" font-size="7">S</text>
  <text x="276" y="207" text-anchor="middle" fill="#5E6A71" font-family="sans-serif" font-size="7">M</text>
  <text x="306" y="207" text-anchor="middle" fill="#5E6A71" font-family="sans-serif" font-size="7">T</text>
  <text x="336" y="207" text-anchor="middle" fill="#5E6A71" font-family="sans-serif" font-size="7">W</text>
  <!-- Sessions line chart -->
  <rect x="30" y="225" width="350" height="60" fill="#fff" rx="8" stroke="#D9E2E0" stroke-width="1"/>
  <text x="45" y="245" fill="#1C2328" font-family="sans-serif" font-size="10" font-weight="bold">Sessions per Day</text>
  <polyline points="55,270 85,265 115,260 145,268 175,255 205,262 235,258 265,270 295,266 325,260" fill="none" stroke="#1F8A83" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <circle cx="175" cy="255" r="3" fill="#1F8A83"/>
  <circle cx="235" cy="258" r="3" fill="#1F8A83"/>
  <circle cx="325" cy="260" r="3" fill="#1F8A83"/>
  <!-- Client activity sidebar -->
  <rect x="400" y="55" width="170" height="230" fill="#fff" rx="8" stroke="#D9E2E0" stroke-width="1"/>
  <text x="415" y="75" fill="#1C2328" font-family="sans-serif" font-size="10" font-weight="bold">Client Activity</text>
  <text x="415" y="100" fill="#5E6A71" font-family="sans-serif" font-size="9">Anna</text>
  <rect x="455" y="91" width="90" height="12" fill="#1F8A83" rx="3"/>
  <text x="415" y="122" fill="#5E6A71" font-family="sans-serif" font-size="9">Mark</text>
  <rect x="455" y="113" width="70" height="12" fill="#A8C9BE" rx="3"/>
  <text x="415" y="144" fill="#5E6A71" font-family="sans-serif" font-size="9">Sara</text>
  <rect x="455" y="135" width="55" height="12" fill="#A8C9BE" rx="3"/>
  <text x="415" y="166" fill="#5E6A71" font-family="sans-serif" font-size="9">John</text>
  <rect x="455" y="157" width="40" height="12" fill="#A8C9BE" rx="3"/>
  <!-- Export button -->
  <rect x="415" y="250" width="140" height="24" fill="#1F8A83" rx="5"/>
  <text x="485" y="266" text-anchor="middle" fill="#fff" font-family="sans-serif" font-size="10">Export PDF</text>
</svg>
